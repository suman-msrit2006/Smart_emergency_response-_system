name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18.x'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: Hackathonproject/server/package-lock.json
    
    - name: Install dependencies
      working-directory: Hackathonproject/server
      run: npm ci
    
    - name: Run ESLint (if configured)
      working-directory: Hackathonproject/server
      run: npm run lint --if-present
      continue-on-error: true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: Hackathonproject/server/package-lock.json
    
    - name: Install dependencies
      working-directory: Hackathonproject/server
      run: npm ci
    
    - name: Run tests
      working-directory: Hackathonproject/server
      run: npm test --if-present
      continue-on-error: true

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: Hackathonproject/server/package-lock.json
    
    - name: Install dependencies
      working-directory: Hackathonproject/server
      run: npm ci
    
    - name: Check for build script
      working-directory: Hackathonproject/server
      run: npm run build --if-present
      continue-on-error: true
    
    - name: Verify server starts
      working-directory: Hackathonproject/server
      run: |
        timeout 10s npm start || code=$?
        if [[ $code -ne 124 && $code -ne 0 ]]; then
          exit $code
        fi
      env:
        MONGODB_URI: mongodb://localhost:27017/test
        JWT_SECRET: test-secret-key-for-ci-cd-pipeline
        NODE_ENV: test

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: Hackathonproject/server/package-lock.json
    
    - name: Install dependencies
      working-directory: Hackathonproject/server
      run: npm ci
    
    - name: Run security audit
      working-directory: Hackathonproject/server
      run: npm audit --audit-level=moderate
      continue-on-error: true
    
    - name: Check for vulnerabilities
      working-directory: Hackathonproject/server
      run: npm audit --production --audit-level=high

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging-api.your-domain.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to Render (Staging)
      run: |
        echo "Deploying to staging environment..."
        # Add your staging deployment commands here
        # Example: curl -X POST https://api.render.com/deploy/your-staging-service
    
    - name: Health Check
      run: |
        sleep 30
        curl --fail https://staging-api.your-domain.com/api/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.your-domain.com
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to Render (Production)
      run: |
        echo "Deploying to production environment..."
        # Render auto-deploys from main branch
        # Or trigger manual deployment via webhook
        # curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
    
    - name: Health Check
      run: |
        sleep 60
        curl --fail https://api.your-domain.com/api/health || exit 1
    
    - name: Notify deployment
      run: |
        echo "✅ Production deployment successful!"
        # Add Slack/Discord notification here

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
    - name: Send notification
      run: |
        if [ "${{ needs.deploy-production.result }}" == "success" ]; then
          echo "🎉 Production deployment successful!"
        elif [ "${{ needs.deploy-staging.result }}" == "success" ]; then
          echo "✅ Staging deployment successful!"
        else
          echo "❌ Deployment failed!"
        fi
